app = "auralis-backend"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  image = "Dockerfile"

[env]
  ENABLE_AI_ANALYSIS = "false"
  AI_ANALYSIS_REQUIRED = "false"
  AWS_REGION = "us-east-1"
  BEDROCK_MODEL_ID = "anthropic.claude-3-sonnet-20240229-v1:0"

[experimental]
  allowed_public_ports = [8080]
  auto_rollback = true
